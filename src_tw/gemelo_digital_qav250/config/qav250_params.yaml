/**:
  ros__parameters:
    #PARAMETROS FISICOS DEL DRONE
    # ── Masa total del drone [kg] ────────────────────────────────
    # NOTA: Si el dron está restringido en el soporte FFT GYRO, la masa total 'm'
    # se usa en el modelo de traslación (X, Y, Z). Reemplazar con medición real.
    m: 0.650        # [ESTIMADO] reemplazar con medición real

    # ── Geometría [m] ────────────────────────────────────────────
    # Distancia del centro de masa al eje de cada rotor (brazo)
    l: 0.125        # [SOLIDWORKS] pendiente

    # ── Momentos de inercia [kg·m²] ──────────────────────────────
    # ¡CRÍTICO PARA LA VALIDACIÓN!
    # Como el dron está montado sobre la base rotatoria del FFT GYRO, las inercias
    # medidas dependerán del sistema completo:
    #   I_total = I_dron (de SolidWorks) + I_soporte (parte móvil del FFT GYRO)
    # Deben estimar o medir la inercia que agrega el soporte móvil en cada eje
    # y sumarla a los momentos del dron para que las dinámicas estimadas coincidan.
    Ixx: 0.0058     # [SOLIDWORKS + GYRO] inercia total en X (roll)
    Iyy: 0.0058     # [SOLIDWORKS + GYRO] inercia total en Y (pitch)
    Izz: 0.0100     # [SOLIDWORKS + GYRO] inercia total en Z (yaw)

    # ── Coeficientes aerodinámicos ───────────────────────────────
    # k: coeficiente de empuje   F = k * omega²   [N·s²/rad²]
    # b: coeficiente de arrastre Q = b * omega²   [N·m·s²/rad²]
    k: 3.13e-05     # [BANCO] pendiente
    b: 7.50e-07     # [BANCO] pendiente

    # ── Inercia del rotor [kg·m²] ────────────────────────────────
    # Motor RS2205 2300KV
    # Cómo obtenerlo: datasheet del motor o medir experimentalmente
    # CHECAR / CORREGIR ESTO
    Ir: 6.00e-05    # [DATASHEET] pendiente

    # ── Arrastre aerodinámico traslacional [kg/s] ────────────────
    # Fuerza de arrastre en cada eje: F_arrastre = A * velocidad
    # Poner 0.0 si no se tiene dato o si se quiere ignorar este efecto
    Ax: 0.0         # [ESTIMADO] arrastre en X
    Ay: 0.0         # [ESTIMADO] arrastre en Y
    Az: 0.0         # [ESTIMADO] arrastre en Z


    # PARÁMETROS DE CONEXIÓN MAVLink
    # Modo de conexión: "udp" (con QGroundControl) o "serial" (directo)
    mavlink_modo: "udp"

    # Puerto serial — solo aplica si mavlink_modo = "serial"
    # Windows: "COM3", "COM4", etc.
    # Linux:   "/dev/ttyUSB0", "/dev/ttyACM0"
    mavlink_puerto: "COM3"

    # Puerto UDP — solo aplica si mavlink_modo = "udp"
    # QGC transmite en 14550; este nodo escucha en 14551
    mavlink_udp_puerto: 14551


    # PARÁMETROS DEL NODO ROS 2
    # Frecuencia de publicación del estado [Hz]
    # Debe coincidir aprox. con la tasa de SERVO_OUTPUT_RAW del Pixhawk (~20Hz)
    frecuencia_hz: 20.0

    # Topic donde se publica la pose (para Gazebo / RViz)
    topic_pose: "/qav250/pose"

    # Topic donde se publican las velocidades angulares de motores
    topic_motores: "/qav250/motores"


    # PARÁMETROS DEL MOTOR RS2205 2300KV
    motor_kv: 2300          # KV rating del motor [RPM/V]
    bateria_voltaje: 14.8   # Voltaje de la batería 4S [V]
    esc_eficiencia: 0.85    # Eficiencia estimada del ESC [0-1]
